name: ci

on:
  push:
  pull_request:

jobs:
  pylint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Module 5 dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r module_5/requirements.txt

      - name: Run Pylint
        run: python -m pylint module_5/src/*.py --fail-under=10

  pytest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gradcafe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gradcafe_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gradcafe_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gradcafe_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Module 5 dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r module_5/requirements.txt

      - name: Run marked tests with coverage
        run: pytest module_5 -m "web or buttons or analysis or db or integration"

  dependency-graph:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install Module 5 dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r module_5/requirements.txt

      - name: Generate dependency graph
        run: pydeps module_5/src/app.py --noshow -T svg -o module_5/dependency.svg

      - name: Verify dependency graph exists
        run: test -f module_5/dependency.svg

  snyk:
    runs-on: ubuntu-latest

    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Module 5 dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r module_5/requirements.txt

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk dependency scan
        working-directory: module_5
        run: snyk test --file=requirements.txt --package-manager=pip --command=python || true
